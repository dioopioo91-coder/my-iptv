<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyIPTV — Русские и Таджикские каналы</title>
  <meta name="description" content="Бесплатный IPTV-плеер с русскими и таджикскими ТВ-каналами">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>
  <style>
    /* ===== RESET & VARIABLES ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a28;
      --bg-card-hover: #222236;
      --bg-glass: rgba(26, 26, 40, 0.75);
      --accent: #7c5cfc;
      --accent-light: #9b82fc;
      --accent-glow: rgba(124, 92, 252, 0.35);
      --accent-gradient: linear-gradient(135deg, #7c5cfc 0%, #c084fc 50%, #f472b6 100%);
      --text-primary: #e8e6f0;
      --text-secondary: #9895a8;
      --text-muted: #65627a;
      --border: rgba(255,255,255,0.06);
      --border-active: rgba(124, 92, 252, 0.4);
      --success: #34d399;
      --danger: #f87171;
      --warning: #fbbf24;
      --sidebar-w: 380px;
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { font-size: 15px; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ===== LAYOUT ===== */
    .app {
      display: flex;
      height: 100vh;
      position: relative;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
      transition: transform var(--transition);
    }

    .sidebar-header {
      padding: 20px 22px 14px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: var(--accent-gradient);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .logo-text {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-badge {
      font-size: 0.6rem;
      font-weight: 600;
      padding: 2px 7px;
      background: rgba(124, 92, 252, 0.15);
      color: var(--accent-light);
      border-radius: 20px;
      margin-left: auto;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Search */
    .search-box {
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border var(--transition), box-shadow var(--transition);
    }

    .search-box input:focus {
      border-color: var(--border-active);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-box input::placeholder { color: var(--text-muted); }

    .search-box .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.95rem;
      pointer-events: none;
    }

    /* Tabs */
    .tabs {
      display: flex;
      padding: 12px 22px 0;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 9px 0;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
      position: relative;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .tab-btn:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }

    .tab-btn.active {
      color: var(--accent-light);
      background: rgba(124, 92, 252, 0.1);
    }

    .tab-btn .tab-count {
      font-size: 0.7rem;
      font-weight: 400;
      margin-left: 4px;
      opacity: 0.6;
    }

    /* Channel List */
    .channel-list-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .channel-list {
      height: 100%;
      overflow-y: auto;
      padding: 10px 12px 80px;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-card) transparent;
    }

    .channel-list::-webkit-scrollbar { width: 5px; }
    .channel-list::-webkit-scrollbar-track { background: transparent; }
    .channel-list::-webkit-scrollbar-thumb { background: var(--bg-card); border-radius: 10px; }

    .channel-group-header {
      padding: 12px 10px 6px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      z-index: 1;
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      border: 1px solid transparent;
      margin-bottom: 2px;
    }

    .channel-item:hover {
      background: var(--bg-card);
      border-color: var(--border);
    }

    .channel-item.active {
      background: rgba(124, 92, 252, 0.1);
      border-color: var(--border-active);
      box-shadow: 0 0 20px rgba(124, 92, 252, 0.08);
    }

    .channel-item.active .channel-name { color: var(--accent-light); }

    .channel-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .channel-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 4px;
    }

    .channel-logo .fallback {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
    }

    .channel-info { flex: 1; min-width: 0; }

    .channel-name {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color var(--transition);
    }

    .channel-category {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .channel-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .channel-status.live {
      background: var(--success);
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
      animation: pulse-live 2s infinite;
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
    }

    /* Player Area */
    .player-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #000;
    }

    .player-area video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* Placeholder */
    .player-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .player-placeholder.hidden { display: none; }

    .placeholder-icon {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .placeholder-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .placeholder-sub {
      font-size: 0.9rem;
      max-width: 320px;
      line-height: 1.5;
    }

    /* Now Playing Bar */
    .now-playing-bar {
      padding: 14px 24px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 64px;
    }

    .now-playing-info {
      flex: 1;
      min-width: 0;
    }

    .now-playing-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .now-playing-name {
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .now-playing-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .control-btn:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-active);
      color: var(--accent-light);
      transform: scale(1.05);
    }

    .control-btn.fullscreen-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .control-btn.fullscreen-btn:hover {
      background: var(--accent-light);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .volume-slider {
      -webkit-appearance: none;
      width: 80px;
      height: 4px;
      border-radius: 2px;
      background: var(--bg-card);
      outline: none;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px var(--accent-glow);
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 5;
      backdrop-filter: blur(6px);
    }

    .loading-overlay.hidden { display: none; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--bg-card);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    /* Error toast */
    .error-toast {
      position: fixed;
      bottom: 90px;
      right: 24px;
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--danger);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      z-index: 100;
      backdrop-filter: blur(10px);
      animation: slideIn 0.3s ease;
      max-width: 360px;
    }

    .error-toast.hidden { display: none; }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Stats bar */
    .stats-bar {
      padding: 8px 22px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .stat-dot.ru { background: #7c5cfc; }
    .stat-dot.tj { background: #f472b6; }
    .stat-dot.uz { background: #38bdf8; }
    .stat-dot.all { background: var(--success); }

    /* Mobile toggle */
    .mobile-toggle {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 16px;
      z-index: 20;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-100%);
        z-index: 50;
        box-shadow: 4px 0 30px rgba(0,0,0,0.5);
      }

      .sidebar.open { transform: translateX(0); }

      .mobile-toggle { display: flex; align-items: center; justify-content: center; }

      .main-content { width: 100%; }
    }

    /* ===== SCROLLBAR FIX ===== */
    * { scrollbar-width: thin; scrollbar-color: var(--bg-card) transparent; }
  </style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">📺</div>
        <span class="logo-text">MyIPTV</span>
        <span class="logo-badge">Live</span>
      </div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Поиск каналов..." autocomplete="off">
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="all" id="tabAll">Все <span class="tab-count" id="countAll">0</span></button>
      <button class="tab-btn" data-tab="ru" id="tabRu">🇷🇺 РФ <span class="tab-count" id="countRu">0</span></button>
      <button class="tab-btn" data-tab="tj" id="tabTj">🇹🇯 РТ <span class="tab-count" id="countTj">0</span></button>
      <button class="tab-btn" data-tab="uz" id="tabUz">🇺🇿 УЗ <span class="tab-count" id="countUz">0</span></button>
      <button class="tab-btn" data-tab="fav" id="tabFav">⭐ <span class="tab-count" id="countFav">0</span></button>
    </div>

    <div class="channel-list-wrapper">
      <div class="channel-list" id="channelList"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="stats-bar">
      <div class="stat-item"><span class="stat-dot all"></span> Каналов: <strong id="statTotal">0</strong></div>
      <div class="stat-item"><span class="stat-dot ru"></span> РФ: <strong id="statRu">0</strong></div>
      <div class="stat-item"><span class="stat-dot tj"></span> РТ: <strong id="statTj">0</strong></div>
      <div class="stat-item"><span class="stat-dot uz"></span> УЗ: <strong id="statUz">0</strong></div>
    </div>

    <div class="player-area" id="playerArea">
      <video id="videoPlayer" controls autoplay></video>

      <div class="player-placeholder" id="placeholder">
        <div class="placeholder-icon">📡</div>
        <div class="placeholder-title">Выберите канал</div>
        <div class="placeholder-sub">Загрузите плейлист и выберите канал из списка слева, чтобы начать просмотр</div>
      </div>

      <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Загрузка каналов...</div>
      </div>
    </div>

    <div class="now-playing-bar">
      <div class="now-playing-info">
        <div class="now-playing-label">Сейчас играет</div>
        <div class="now-playing-name" id="nowPlayingName">Ничего не воспроизводится</div>
      </div>
      <div class="now-playing-controls">
        <button class="control-btn" id="prevBtn" title="Предыдущий">⏮</button>
        <button class="control-btn" id="muteBtn" title="Звук">🔊</button>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
        <button class="control-btn" id="nextBtn" title="Следующий">⏭</button>
        <button class="control-btn fullscreen-btn" id="fullscreenBtn" title="На весь экран">⛶</button>
      </div>
    </div>
  </main>

  <div class="error-toast hidden" id="errorToast"></div>
  <button class="mobile-toggle" id="mobileToggle">☰</button>
</div>

<script>
// ===== STATE =====
let allChannels = [];
let filteredChannels = [];
let currentTab = 'all';
let currentChannelIndex = -1;
let hlsInstance = null;
let favorites = JSON.parse(localStorage.getItem('iptv_favorites') || '[]');

const PLAYLISTS = [
  { url: 'https://iptv-org.github.io/iptv/countries/ru.m3u', country: 'ru', flag: '🇷🇺' },
  { url: 'https://iptv-org.github.io/iptv/countries/tj.m3u', country: 'tj', flag: '🇹🇯' },
  { url: 'https://iptv-org.github.io/iptv/countries/uz.m3u', country: 'uz', flag: '🇺🇿' },
];

// ===== DOM =====
const searchInput = document.getElementById('searchInput');
const channelList = document.getElementById('channelList');
const videoPlayer = document.getElementById('videoPlayer');
const placeholder = document.getElementById('placeholder');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadingText = document.getElementById('loadingText');
const nowPlayingName = document.getElementById('nowPlayingName');
const errorToast = document.getElementById('errorToast');
const volumeSlider = document.getElementById('volumeSlider');
const sidebar = document.getElementById('sidebar');
const mobileToggle = document.getElementById('mobileToggle');

// ===== PARSE M3U =====
function parseM3U(text, country, flag) {
  const lines = text.split('\n');
  const channels = [];
  let currentInfo = null;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#EXTINF:')) {
      const nameMatch = line.match(/,(.+)$/);
      const logoMatch = line.match(/tvg-logo="([^"]*)"/);
      const groupMatch = line.match(/group-title="([^"]*)"/);
      currentInfo = {
        name: nameMatch ? nameMatch[1].trim() : 'Неизвестный канал',
        logo: logoMatch ? logoMatch[1] : '',
        group: groupMatch ? groupMatch[1] : '',
        country: country,
        flag: flag,
      };
    } else if (line && !line.startsWith('#') && currentInfo) {
      channels.push({
        ...currentInfo,
        url: line,
        id: btoa(unescape(encodeURIComponent(line))).slice(0, 20),
      });
      currentInfo = null;
    }
  }
  return channels;
}

// ===== FETCH PLAYLISTS =====
async function fetchPlaylists() {
  loadingOverlay.classList.remove('hidden');
  loadingText.textContent = 'Загрузка каналов...';

  const results = [];
  for (const pl of PLAYLISTS) {
    try {
      loadingText.textContent = `Загрузка ${pl.flag} ...`;
      const resp = await fetch(pl.url);
      const text = await resp.text();
      const ch = parseM3U(text, pl.country, pl.flag);
      results.push(...ch);
    } catch (e) {
      showError(`Не удалось загрузить ${pl.flag}: ${e.message}`);
    }
  }

  // Deduplicate by URL
  const seen = new Set();
  allChannels = results.filter(c => {
    if (seen.has(c.url)) return false;
    seen.add(c.url);
    return true;
  });

  updateStats();
  applyFilters();
  loadingOverlay.classList.add('hidden');
}

// ===== RENDERING =====
function renderChannels() {
  channelList.innerHTML = '';

  if (filteredChannels.length === 0) {
    channelList.innerHTML = `
      <div style="text-align:center; padding:40px 20px; color:var(--text-muted);">
        <div style="font-size:2rem; margin-bottom:10px;">📭</div>
        <div>Каналы не найдены</div>
      </div>
    `;
    return;
  }

  // Group by group-title
  const groups = {};
  filteredChannels.forEach(ch => {
    const g = ch.group || 'Другое';
    if (!groups[g]) groups[g] = [];
    groups[g].push(ch);
  });

  Object.keys(groups).sort().forEach(groupName => {
    const header = document.createElement('div');
    header.className = 'channel-group-header';
    header.textContent = groupName;
    channelList.appendChild(header);

    groups[groupName].forEach(ch => {
      const idx = allChannels.indexOf(ch);
      const item = document.createElement('div');
      item.className = 'channel-item' + (idx === currentChannelIndex ? ' active' : '');
      item.dataset.index = idx;

      const isFav = favorites.includes(ch.url);

      item.innerHTML = `
        <div class="channel-logo">
          ${ch.logo ? `<img src="${ch.logo}" alt="" onerror="this.parentElement.innerHTML='<span class=fallback>${ch.name[0]}</span>'">` : `<span class="fallback">${ch.name[0]}</span>`}
        </div>
        <div class="channel-info">
          <div class="channel-name">${ch.flag} ${ch.name}</div>
          <div class="channel-category">${ch.group || ''}</div>
        </div>
        <span style="cursor:pointer;font-size:1rem;opacity:${isFav ? 1 : 0.3}" class="fav-star" data-url="${ch.url}" title="В избранное">${isFav ? '⭐' : '☆'}</span>
        <div class="channel-status live"></div>
      `;

      item.addEventListener('click', (e) => {
        if (e.target.closest('.fav-star')) {
          toggleFavorite(ch.url);
          return;
        }
        playChannel(idx);
      });

      channelList.appendChild(item);
    });
  });
}

// ===== PLAY CHANNEL =====
function playChannel(index) {
  if (index < 0 || index >= allChannels.length) return;

  currentChannelIndex = index;
  const ch = allChannels[index];

  placeholder.classList.add('hidden');
  nowPlayingName.textContent = `${ch.flag} ${ch.name}`;

  // Destroy previous HLS instance
  if (hlsInstance) {
    hlsInstance.destroy();
    hlsInstance = null;
  }

  loadingOverlay.classList.remove('hidden');
  loadingText.textContent = `Подключение к ${ch.name}...`;

  if (Hls.isSupported()) {
    hlsInstance = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
    });
    hlsInstance.loadSource(ch.url);
    hlsInstance.attachMedia(videoPlayer);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      videoPlayer.play().catch(() => {});
      loadingOverlay.classList.add('hidden');
    });
    hlsInstance.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        loadingOverlay.classList.add('hidden');
        showError(`Ошибка воспроизведения: ${data.type}`);
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          hlsInstance.startLoad();
        } else {
          hlsInstance.destroy();
        }
      }
    });
  } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
    videoPlayer.src = ch.url;
    videoPlayer.addEventListener('loadedmetadata', () => {
      videoPlayer.play().catch(() => {});
      loadingOverlay.classList.add('hidden');
    }, { once: true });
  } else {
    // Try direct playback
    videoPlayer.src = ch.url;
    videoPlayer.play().catch(() => {
      loadingOverlay.classList.add('hidden');
      showError('Ваш браузер не поддерживает HLS-потоки');
    });
    loadingOverlay.classList.add('hidden');
  }

  renderChannels();

  // Close sidebar on mobile
  if (window.innerWidth <= 768) {
    sidebar.classList.remove('open');
  }
}

// ===== FAVORITES =====
function toggleFavorite(url) {
  const idx = favorites.indexOf(url);
  if (idx >= 0) {
    favorites.splice(idx, 1);
  } else {
    favorites.push(url);
  }
  localStorage.setItem('iptv_favorites', JSON.stringify(favorites));
  updateStats();
  applyFilters();
}

// ===== FILTERS =====
function applyFilters() {
  const query = searchInput.value.toLowerCase().trim();

  filteredChannels = allChannels.filter(ch => {
    // Tab filter
    if (currentTab === 'ru' && ch.country !== 'ru') return false;
    if (currentTab === 'tj' && ch.country !== 'tj') return false;
    if (currentTab === 'uz' && ch.country !== 'uz') return false;
    if (currentTab === 'fav' && !favorites.includes(ch.url)) return false;

    // Search filter
    if (query) {
      return ch.name.toLowerCase().includes(query) ||
             (ch.group && ch.group.toLowerCase().includes(query));
    }
    return true;
  });

  renderChannels();
}

// ===== STATS =====
function updateStats() {
  const ru = allChannels.filter(c => c.country === 'ru').length;
  const tj = allChannels.filter(c => c.country === 'tj').length;
  const uz = allChannels.filter(c => c.country === 'uz').length;
  const fav = favorites.length;

  document.getElementById('statTotal').textContent = allChannels.length;
  document.getElementById('statRu').textContent = ru;
  document.getElementById('statTj').textContent = tj;
  document.getElementById('statUz').textContent = uz;
  document.getElementById('countAll').textContent = allChannels.length;
  document.getElementById('countRu').textContent = ru;
  document.getElementById('countTj').textContent = tj;
  document.getElementById('countUz').textContent = uz;
  document.getElementById('countFav').textContent = fav;
}

// ===== ERROR TOAST =====
function showError(msg) {
  errorToast.textContent = msg;
  errorToast.classList.remove('hidden');
  setTimeout(() => errorToast.classList.add('hidden'), 5000);
}

// ===== EVENT LISTENERS =====
// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    applyFilters();
  });
});

// Search
searchInput.addEventListener('input', () => {
  applyFilters();
});

// Volume
volumeSlider.addEventListener('input', () => {
  videoPlayer.volume = volumeSlider.value / 100;
});

// Mute
document.getElementById('muteBtn').addEventListener('click', () => {
  videoPlayer.muted = !videoPlayer.muted;
  document.getElementById('muteBtn').textContent = videoPlayer.muted ? '🔇' : '🔊';
});

// Fullscreen
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  const pa = document.getElementById('playerArea');
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    pa.requestFullscreen().catch(() => {});
  }
});

// Prev / Next
document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentChannelIndex > 0) playChannel(currentChannelIndex - 1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentChannelIndex < allChannels.length - 1) playChannel(currentChannelIndex + 1);
});

// Mobile toggle
mobileToggle.addEventListener('click', () => {
  sidebar.classList.toggle('open');
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target === searchInput) return;
  switch(e.key) {
    case 'ArrowUp':
      e.preventDefault();
      if (currentChannelIndex > 0) playChannel(currentChannelIndex - 1);
      break;
    case 'ArrowDown':
      e.preventDefault();
      if (currentChannelIndex < allChannels.length - 1) playChannel(currentChannelIndex + 1);
      break;
    case 'm':
      videoPlayer.muted = !videoPlayer.muted;
      document.getElementById('muteBtn').textContent = videoPlayer.muted ? '🔇' : '🔊';
      break;
    case 'f':
      document.getElementById('fullscreenBtn').click();
      break;
  }
});

// ===== INIT =====
videoPlayer.volume = 0.8;
fetchPlaylists();
</script>

</body>
